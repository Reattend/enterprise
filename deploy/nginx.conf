# /etc/nginx/sites-available/reattend
server {
    listen 80;
    server_name reattend.com www.reattend.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name reattend.com www.reattend.com;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/reattend.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reattend.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE streaming support (for chat-stream proxy)
        proxy_buffering off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Static assets — let Next.js handle, but increase timeout
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check
    location /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3000/api/health;
    }

    client_max_body_size 10M;
}
